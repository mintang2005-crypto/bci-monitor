<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>脑机接口 - 10-20 电极监控 </title>
    <!-- 引入 Vue 2 框架 -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <!-- 引入 Chart.js 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入 Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ========== 页面样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef2f5;
            height: 100vh;
            padding: 8px;
            overflow: hidden;  /* 防止整体滚动条 */
        }
        .app-container {
            display: flex;
            flex-direction: column;   /* 上下排列：头部、中间、底部 */
            height: 100vh;
            background: #f8f9fc;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        /* 头部区域：设备ID + 三个按钮 */
        .header {
            background: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
        }
        .device-info {
            font-size: 16px;
            font-weight: bold;
        }
        .button-group button {
            margin-left: 10px;
            padding: 6px 14px;
            border: none;
            border-radius: 24px;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-start { background: #27ae60; color: white; }
        .btn-stop { background: #e74c3c; color: white; }
        .btn-exit { background: #7f8c8d; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        /* 中间主体：左右两栏 */
        .dashboard {
            display: flex;
            gap: 16px;
            padding: 12px;
            overflow: hidden;
            align-items: flex-start;
            flex: 0 0 auto;      /* 不自动拉伸，高度由下面决定 */
            height: 55vh;        /* 占屏幕高度的55%，让中间区域缩小 */
            min-height: 300px;
        }
        /* 左侧电极图面板 */
        .electrode-panel {
            flex: 0 0 38%;       /* 固定宽度占比38% */
            background: white;
            border-radius: 14px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .electrode-panel h3 {
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .electrode-svg-container {
            flex: 1;             /* 占据剩余高度，让SVG自适应 */
            min-height: 0;
            width: 100%;
        }
        svg {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 12px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 8px;
            font-size: 11px;
            flex-shrink: 0;
        }
        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        /* 右侧四个通道折线图面板 */
        .charts-panel {
            flex: 1;             /* 剩余宽度全部给右侧，使图表可以拉宽 */
            background: white;
            border-radius: 14px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
            overflow: hidden;
        }
        .chart-card {
            background: #fafbfc;
            border-radius: 10px;
            padding: 4px 8px;
            display: flex;
            flex-direction: column;
            flex: 1;             /* 四个卡片等分垂直高度 */
            min-height: 0;
        }
        .chart-card h4 {
            font-size: 12px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .chart-card canvas {
            width: 100%;
            flex: 1;             /* canvas 填满卡片剩余空间 */
            min-height: 0;
        }
        /* 底部状态栏 */
        .status-bar {
            background: white;
            padding: 16px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #e9ecef;
            flex-shrink: 0;
        }
        .status-value {
            font-size: 26px;
            font-weight: bold;
            padding: 10px 32px;
            border-radius: 60px;
            text-align: center;
        }
        /* 三种状态对应的背景色 */
        .放松 { background: #27ae60; color: white; }
        .集中 { background: #2980b9; color: white; }
        .中性 { background: #e67e22; color: white; }
        .data-status { display: none; }  /* 隐藏旧版本的状态标签 */
    </style>
</head>
<body>
<div id="app">
    <div class="app-container">
        <!-- 头部：显示设备ID和三个控制按钮 -->
        <div class="header">
            <div class="device-info"><i class="fas fa-microchip"></i> 设备ID：{{ deviceId }}</div>
            <div class="button-group">
                <button class="btn-start" @click="startAnalysis" :disabled="isRunning"><i class="fas fa-play"></i> 开始分析</button>
                <button class="btn-stop" @click="stopAnalysis" :disabled="!isRunning"><i class="fas fa-stop"></i> 结束分析</button>
                <button class="btn-exit" @click="exitDevice"><i class="fas fa-sign-out-alt"></i> 退出设备</button>
            </div>
        </div>
        <!-- 中间区域：左侧电极图 + 右侧四个折线图 -->
        <div class="dashboard">
            <!-- 左侧电极图 SVG 容器 -->
            <div class="electrode-panel">
                <h3><i class="fas fa-brain"></i> 国际 10-20 电极系统</h3>
                <div class="electrode-svg-container">
                    <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" id="electrodeSvg">
                        <!-- 头部轮廓椭圆，辅助视觉 -->
                        <ellipse cx="50" cy="50" rx="45" ry="45" fill="#f4f6f9" stroke="#ccc" stroke-width="0.5"/>
                        <!-- 上方标注 NASION，下方标注 INION -->
                        <text x="50" y="2" font-size="2.5" text-anchor="middle" fill="#2c3e50">NASION</text>
                        <text x="50" y="100" font-size="2.5" text-anchor="middle" fill="#2c3e50">INION</text>
                    </svg>
                </div>
                <!-- 图例说明 -->
                <div class="legend">
                    <span><i class="fas fa-circle" style="color:#f1c40f"></i> 相对电极</span>
                    <span><i class="fas fa-circle" style="color:#2ecc71"></i> 校准参考点 (NZ)</span>
                    <span><i class="fas fa-circle" style="color:#bdc3c7"></i> 其他电极</span>
                </div>
            </div>
            <!-- 右侧四个通道折线图 -->
            <div class="charts-panel">
                <div class="chart-card">
                    <h4><i class="fas fa-waveform" style="color:#e74c3c"></i> TP9</h4>
                    <canvas id="chart1"></canvas>
                </div>
                <div class="chart-card">
                    <h4><i class="fas fa-waveform" style="color:#3498db"></i> AF7</h4>
                    <canvas id="chart2"></canvas>
                </div>
                <div class="chart-card">
                    <h4><i class="fas fa-waveform" style="color:#2ecc71"></i> AF8</h4>
                    <canvas id="chart3"></canvas>
                </div>
                <div class="chart-card">
                    <h4><i class="fas fa-waveform" style="color:#f39c12"></i> TP10</h4>
                    <canvas id="chart4"></canvas>
                </div>
            </div>
        </div>
        <!-- 底部状态栏，显示当前放松/集中/中性状态 -->
        <div class="status-bar">
            <div class="status-value" :class="statusClass">{{ statusText }}</div>
        </div>
    </div>
</div>

<script>
    // 1. 电极位置数据定义 (基于国际10-20系统，11条纬线)
    // 每条纬线的 Y 坐标 (从上到下，范围 0-100)
    const yPos = {
        line1: 5,   // NZ
        line2: 12,  // FP1, FPz, FP2
        line3: 20,  // AF7, AF3, AFz, AF4, AF8
        line4: 28,  // F9, F7, F5, F3, F1, Fz, F2, F4, F6, F8, F10
        line5: 36,  // FT9, FT7, FC5, FC3, FC1, FCz, FC2, FC4, FC6, FC8, FC10
        line6: 46,  // A1, T9, T7, C5, C3, C1, Cz, C2, C4, C6, T8, T10, A2
        line7: 56,  // TP9, TP7, CP5, CP3, CP1, CPz, CP2, CP4, CP6, CP8, TP10
        line8: 66,  // P9, P7, P5, P3, P1, Pz, P2, P4, P6, P8, P10
        line9: 76,  // PO7, PO3, POz, PO4, PO8
        line10: 86, // O1, Oz, O2
        line11: 95  // IZ
    };

    // 每条纬线上的电极名称 (从左到右排列)
    const electrodesByLine = {
        line1:  ["NZ"],
        line2:  ["FP1", "FPz", "FP2"],
        line3:  ["AF7", "AF3", "AFz", "AF4", "AF8"],
        line4:  ["F9", "F7", "F5", "F3", "F1", "Fz", "F2", "F4", "F6", "F8", "F10"],
        line5:  ["FT9", "FT7", "FC5", "FC3", "FC1", "FCz", "FC2", "FC4", "FC6", "FC8", "FC10"],
        line6:  ["A1", "T9", "T7", "C5", "C3", "C1", "Cz", "C2", "C4", "C6", "T8", "T10", "A2"],
        line7:  ["TP9", "TP7", "CP5", "CP3", "CP1", "CPz", "CP2", "CP4", "CP6", "CP8", "TP10"],
        line8:  ["P9", "P7", "P5", "P3", "P1", "Pz", "P2", "P4", "P6", "P8", "P10"],
        line9:  ["PO7", "PO3", "POz", "PO4", "PO8"],
        line10: ["O1", "Oz", "O2"],
        line11: ["IZ"]
    };

    /**
     * 根据给定的 Y 坐标和该行电极个数，计算每个电极的 X 坐标 (左右对称)
     * @param {number} n - 该行电极个数
     * @param {number} y - Y 坐标 (0-100)
     * @returns {number[]} 长度为 n 的 X 坐标数组
     */
    function getXPositions(n, y) {
        if (n === 1) return [50];  // 只有1个电极时居中
        // 相对于椭圆中心 (50,50)，横向半径 45，纵向半径 45
        const dy = (y - 50) / 45;
        // 最大偏移量，Y 越靠近顶部或底部，偏移越小，符合椭圆形状
        let maxOffset = 42 * Math.sqrt(1 - dy * dy);
        if (maxOffset < 8) maxOffset = 8;   // 防止过于拥挤
        const step = (2 * maxOffset) / (n - 1);
        const startX = 50 - maxOffset;
        return Array.from({ length: n }, (_, i) => startX + i * step);
    }

    /**
     * 生成所有电极的 {name, x, y} 数组
     */
    function generateElectrodes() {
        let electrodes = [];
        for (let i = 1; i <= 11; i++) {
            const lineKey = `line${i}`;
            const y = yPos[lineKey];
            const names = electrodesByLine[lineKey];
            const xs = getXPositions(names.length, y);
            for (let j = 0; j < names.length; j++) {
                electrodes.push({ name: names[j], x: xs[j], y: y });
            }
        }
        return electrodes;
    }

    // Vue 应用实例 
    new Vue({
        el: '#app',            // 挂载到 id="app" 的元素
        data: {
            // 从 localStorage 读取设备ID，如果没有则使用默认值
            deviceId: localStorage.getItem('deviceId') || 'BCI-001',
            isRunning: false,      // 是否正在分析数据
            intervalId: null,      // 定时器ID，用于停止数据更新
            statusText: '等待开始', // 底部显示的状态文字
            statusClass: '',       // 状态对应的 CSS 类名 (放松/集中/中性)
            // 四个通道的数据数组 (每个数组最多保留30个点)
            dataTP9: [],
            dataAF7: [],
            dataAF8: [],
            dataTP10: [],
            // Chart.js 图表实例
            chart1: null,
            chart2: null,
            chart3: null,
            chart4: null
        },
        // Vue 生命周期钩子: 组件挂载后执行 (此时 DOM 已存在)
        mounted() {
            this.drawElectrodes();   // 绘制左侧电极图
            this.initCharts();       // 初始化右侧四个折线图
        },
        // 组件销毁前清理定时器，防止内存泄漏
        beforeDestroy() {
            if (this.intervalId) clearInterval(this.intervalId);
        },
        methods: {
            /**
             * 绘制所有电极 (圆点 + 文字) 到 SVG 中
             */
            drawElectrodes() {
                const svg = document.getElementById('electrodeSvg');
                const electrodes = generateElectrodes();
                // 定义需要特殊高亮的电极 (Muse传感器和参考点)
                const yellowElectrodes = ["AF7", "AF8", "TP9", "TP10"];
                const greenElectrodes = ["NZ"];
                // 初始颜色全部灰色
                const getInitialColor = (name) => "#bdc3c7";

                electrodes.forEach(e => {
                    // 创建圆点
                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", e.x);
                    circle.setAttribute("cy", e.y);
                    circle.setAttribute("r", "1.8");          // 半径大小
                    circle.setAttribute("data-name", e.name); // 存储电极名，便于以后高亮
                    circle.style.fill = getInitialColor(e.name);
                    circle.style.stroke = "#7f8c8d";
                    circle.style.strokeWidth = "0.3";
                    circle.style.cursor = "pointer";
                    // 点击时在控制台输出电极名称和坐标，方便调试
                    circle.addEventListener("click", () => console.log(`点击电极: ${e.name} (${e.x.toFixed(1)}, ${e.y.toFixed(1)})`));
                    svg.appendChild(circle);

                    // 创建文字标签
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", e.x);
                    text.setAttribute("y", e.y - 2.2);      // 文字比圆点稍高，避免重叠
                    text.setAttribute("font-size", "2.1");
                    text.setAttribute("text-anchor", "middle");
                    text.setAttribute("fill", "#2c3e50");
                    text.textContent = e.name;
                    svg.appendChild(text);
                });

                // 保存一个更新电极颜色的函数，供 start/stop 调用
                // isActive = true 时点亮黄/绿电极，false 时全部变灰
                this.updateElectrodeColors = (isActive) => {
                    const circles = document.querySelectorAll('#electrodeSvg circle');
                    circles.forEach(circle => {
                        const name = circle.getAttribute('data-name');
                        if (isActive) {
                            if (yellowElectrodes.includes(name)) circle.style.fill = "#f1c40f";   // 黄色
                            else if (greenElectrodes.includes(name)) circle.style.fill = "#2ecc71"; // 绿色
                            else circle.style.fill = "#bdc3c7";   // 灰色
                        } else {
                            circle.style.fill = "#bdc3c7";
                        }
                    });
                };
            },

            /**
             * 初始化四个折线图 (Chart.js)
             */
            initCharts() {
                // 公共配置：折线图样式，隐藏X/Y轴刻度数字，只保留轴线
                const chartConfig = {
                    type: 'line',
                    data: { labels: [], datasets: [{ data: [], borderWidth: 2, fill: false, tension: 0.2, pointRadius: 0 }] },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,   // 允许画布高度发生变化
                        animation: false,              // 关闭动画，提高性能
                        plugins: { legend: { display: false }, tooltip: { enabled: false } },
                        scales: {
                            x: { display: true, ticks: { display: false } },  // X轴显示线但隐藏数字
                            y: { display: true, ticks: { display: false, maxTicksLimit: 4 }, grid: { lineWidth: 0.5 } }
                        }
                    }
                };
                // 分别为四个 canvas 创建图表实例，并设置不同的线条颜色
                this.chart1 = new Chart(document.getElementById('chart1'), {
                    ...chartConfig,
                    data: { labels: [], datasets: [{ ...chartConfig.data.datasets[0], borderColor: '#e74c3c' }] }
                });
                this.chart2 = new Chart(document.getElementById('chart2'), {
                    ...chartConfig,
                    data: { labels: [], datasets: [{ ...chartConfig.data.datasets[0], borderColor: '#3498db' }] }
                });
                this.chart3 = new Chart(document.getElementById('chart3'), {
                    ...chartConfig,
                    data: { labels: [], datasets: [{ ...chartConfig.data.datasets[0], borderColor: '#2ecc71' }] }
                });
                this.chart4 = new Chart(document.getElementById('chart4'), {
                    ...chartConfig,
                    data: { labels: [], datasets: [{ ...chartConfig.data.datasets[0], borderColor: '#f39c12' }] }
                });
            },

            /**
             * 更新所有图表 (根据当前 dataTP9 等数组重新渲染)
             */
            updateAllCharts() {
                const update = (chart, data) => {
                    chart.data.labels = data.map((_, i) => i);   // X轴标签为 0,1,2,...
                    chart.data.datasets[0].data = [...data];
                    chart.update('none');            // 无动画更新
                };
                update(this.chart1, this.dataTP9);
                update(this.chart2, this.dataAF7);
                update(this.chart3, this.dataAF8);
                update(this.chart4, this.dataTP10);
            },

            /**
             * 添加一个数据点到四个通道的数组中，并更新图表和状态分析
             */
            addDataPoint(tp9, af7, af8, tp10) {
                this.dataTP9.push(tp9);
                this.dataAF7.push(af7);
                this.dataAF8.push(af8);
                this.dataTP10.push(tp10);
                // 只保留最近30个点，使图表不会太挤
                if (this.dataTP9.length > 30) this.dataTP9.shift();
                if (this.dataAF7.length > 30) this.dataAF7.shift();
                if (this.dataAF8.length > 30) this.dataAF8.shift();
                if (this.dataTP10.length > 30) this.dataTP10.shift();
                this.updateAllCharts();
                this.analyzeStatus(tp9, af7, af8);
            },

            /**
             * 根据当前三个通道的幅值分析状态：放松、集中、中性
             * 简单算法：取三个绝对值的平均值，大于60为集中，小于35为放松，中间为中性
             */
            analyzeStatus(tp9, af7, af8) {
                let avg = (Math.abs(tp9) + Math.abs(af7) + Math.abs(af8)) / 3;
                if (avg > 60) {
                    this.statusText = '集中';
                    this.statusClass = '集中';
                } else if (avg < 35) {
                    this.statusText = '放松';
                    this.statusClass = '放松';
                } else {
                    this.statusText = '中性';
                    this.statusClass = '中性';
                }
            },

            /**
             * 生成模拟的脑电数据 (随机值)
             * 格式与真实后端返回的一致
             */
            generateMockData() {
                return {
                    tp9: 30 + Math.random() * 60,
                    af7: 20 + Math.random() * 50,
                    af8: -40 + Math.random() * 180,
                    tp10: 10 + Math.random() * 40
                };
            },

            /**
             * 获取数据 (目前使用模拟数据，未来可替换为真实后端请求)
             */
            async fetchData() {
                await new Promise(r => setTimeout(r, 30)); // 模拟网络延迟
                return this.generateMockData();
            },

            /**
             * 数据更新循环 (由定时器触发)
             */
            async updateDataLoop() {
                if (!this.isRunning) return;
                const data = await this.fetchData();
                this.addDataPoint(data.tp9, data.af7, data.af8, data.tp10);
            },

            /**
             * 开始分析：清空旧数据、点亮电极、启动定时器
             */
            startAnalysis() {
                if (this.isRunning) return;
                // 清空所有通道的数据
                this.dataTP9 = [];
                this.dataAF7 = [];
                this.dataAF8 = [];
                this.dataTP10 = [];
                this.updateAllCharts();
                // 点亮特殊电极 (黄色/绿色)
                this.updateElectrodeColors(true);
                // 更新界面状态
                this.statusText = '分析中...';
                this.statusClass = '';
                this.isRunning = true;
                // 每200毫秒获取一次新数据 (模拟5Hz采样率)
                this.intervalId = setInterval(() => this.updateDataLoop(), 200);
            },

            /**
             * 结束分析：停止定时器、所有电极变灰、更新状态文字
             */
            stopAnalysis() {
                if (!this.isRunning) return;
                this.isRunning = false;
                if (this.intervalId) clearInterval(this.intervalId);
                this.updateElectrodeColors(false);   // 电极全部恢复灰色
                this.statusText = '已停止';
                this.statusClass = '';
            },

            /**
             * 退出设备：停止分析，跳回连接页面 (index.html)
             */
            exitDevice() {
                this.stopAnalysis();
                window.location.href = 'index.html';
            }
        }
    });
</script>
</body>
</html>
